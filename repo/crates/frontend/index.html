<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="color-scheme" content="light dark" />
    <title>TerraOps</title>
    <link data-trunk rel="icon" href="static/favicon.svg" type="image/svg+xml" />
    <link data-trunk rel="copy-dir" href="static" />
    <link data-trunk rel="css" href="static/tailwind.css" />
  </head>
  <body class="bg-slate-50 text-slate-900 antialiased">
    <div id="root"></div>
    <script>
      // Audit #7 Issue #3: register the tiered offline cache worker.
      // `sw.js` implements cache-first for the app shell, stale-while-
      // revalidate for images, and network-first for API reads.
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', function () {
          navigator.serviceWorker
            .register('/sw.js', { scope: '/' })
            .catch(function (err) {
              // Non-fatal: SW is progressive enhancement only.
              console.warn('terraops sw registration failed:', err);
            });
        });
      }
    </script>
  </body>
</html>
